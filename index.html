<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuan AI - Cara Mudah Dapat Uang dari AI</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: #111;
            border: 2px solid #FFD700;
            border-radius: 20px;
            padding: 35px 25px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
        }
        .badge {
            background: #FFD700;
            color: #000;
            display: inline-block;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 12px;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 28px;
            color: #FFD700;
            margin-bottom: 10px;
            line-height: 1.2;
        }
        .sub {
            color: #00FF00;
            font-weight: 600;
            margin-bottom: 25px;
        }
        .steps {
            background: #1a1a1a;
            border-left: 3px solid #FFD700;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }
        .steps p {margin: 8px 0; font-size: 14px;}
        .steps strong {color: #FFD700;}
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #0a0a0a;
            border: 2px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus {
            border-color: #FFD700;
            outline: none;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }
        #status {
            margin-top: 15px;
            font-weight: 600;
            min-height: 20px;
        }
        .success {color: #00FF00;}
        .error {color: #FF4444;}
        .loading {color: #FFD700;}
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">🔥 TERBATAS 100 ORANG</div>
        <h1>CARA CUAN MUDAH<br>PAKAI AI</h1>
        <p class="sub">100% GRATIS + Step by Step</p>

        <div class="steps">
            <p><strong>Langkah 1:</strong> Save nomor Admin Cuan AI</p>
            <p style="color:#FFD700; font-size:18px;">📱 0822-4957-4471</p>
            <p><strong>Langkah 2:</strong> Isi form dibawah ini</p>
        </div>

        <form id="formCuan">
            <input type="text" id="nama" placeholder="Nama Panggilan Kamu" required>
            <input type="tel" id="wa" placeholder="No. WhatsApp: 0812xxxx" required>
            <button type="submit">KLAIM EBOOK GRATIS SEKARANG</button>
        </form>
        
        <div id="status"></div>
    </div>

    <script>
        // ===== GANTI 2 INI AJA BOS =====
        const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbwHGv3mHGkU0PHgJdgmYJwuFBbRXjxi8VV-fVF21wrXF7Tt6kpBVv544CRRn1IbifngjA/exec"; 
        const WA_ADMIN = "6282249574471";
        // ================================

        document.getElementById('formCuan').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nama = document.getElementById('nama').value.trim();
            const wa = document.getElementById('wa').value.trim();
            const status = document.getElementById('status');
            
            if(!nama || !wa) {
                status.className = 'error';
                status.innerHTML = "Isi nama & WA dulu ya bos";
                return;
            }
            
            status.className = 'loading';
            status.innerHTML = "⏳ Mengirim data...";
            
            // Kirim ke Google Sheet via Webhook
            fetch(WEBHOOK_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    nama: nama,
                    wa: wa,
                    sumber: window.location.hostname
                })
            }).catch(err => console.log('Error:', err));
            
            // Kasih delay 1.5 detik biar berasa ngirim, abis itu buka WA
            setTimeout(function() {
                status.className = 'success';
                status.innerHTML = "✅ Sukses! Membuka WhatsApp...";
                
                const pesan = `Min, mau ebook Cuan AI dong. Nama saya ${nama}`;
                const urlWA = `https://wa.me/${WA_ADMIN}?text=${encodeURIComponent(pesan)}`;
                window.location.href = urlWA;
            }, 1500);
        });
    </script>
</body>
</html>
